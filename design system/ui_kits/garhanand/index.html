<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GarhAnand — UI Kit</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&family=Noto+Sans+Gurmukhi:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Inter', sans-serif;
        background: #0f2a2a;
        color: #f5f1e8;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      :root {
        --primary: #0f2a2a;
        --primary-dark: #0a1e1e;
        --primary-mid: #163535;
        --secondary: #eae3d5;
        --secondary-dim: #d9d0bd;
        --accent: #c2a36b;
        --accent-dim: rgba(194, 163, 107, 0.2);
        --accent-mid: rgba(194, 163, 107, 0.4);
        --cta: #7faf9b;
        --cta-hover: #8fbfab;
        --cta-active: #6f9f8b;
        --text-light: #f5f1e8;
        --text-muted: rgba(245, 241, 232, 0.6);
        --text-dark: #1a2e2e;
        --text-mid: rgba(26, 46, 46, 0.65);
        --font-display: 'Cormorant Garamond', Georgia, serif;
        --font-body: 'Inter', system-ui, sans-serif;
        --font-gu: 'Noto Sans Gurmukhi', sans-serif;
        --radius: 4px;
        --anim: 350ms ease-out;
        --border: rgba(194, 163, 107, 0.18);
        --max: 1200px;
        --gutter: 32px;
      }

      .container {
        max-width: var(--max);
        margin: 0 auto;
        padding: 0 var(--gutter);
      }
      section {
        padding: 80px 0;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 500ms ease-out both;
      }
      .fade-up-2 {
        animation: fadeUp 500ms 120ms ease-out both;
      }
      .fade-up-3 {
        animation: fadeUp 500ms 240ms ease-out both;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" src="Navbar.jsx"></script>
    <script type="text/babel" src="Hero.jsx"></script>
    <script type="text/babel" src="LarivaarSection.jsx"></script>
    <script type="text/babel" src="CoursesSection.jsx"></script>
    <script type="text/babel" src="CampsSection.jsx"></script>
    <script type="text/babel" src="TeacherSection.jsx"></script>
    <script type="text/babel" src="DonationSection.jsx"></script>
    <script type="text/babel" src="Footer.jsx"></script>
    <script type="text/babel" src="App.jsx"></script>
  </body>
</html>
