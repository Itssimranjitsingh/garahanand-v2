<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Inter', sans-serif;
        background: #0f2a2a;
      }

      /* Navbar */
      .navbar {
        position: relative;
        width: 100%;
        background: transparent;
        border-bottom: 1px solid rgba(194, 163, 107, 0.12);
        padding: 0 32px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .navbar.solid {
        background: #0a1e1e;
        box-shadow:
          0 1px 4px rgba(0, 0, 0, 0.18),
          0 4px 16px rgba(0, 0, 0, 0.08);
      }
      .nav-logo {
        font-family: 'Cormorant Garamond';
        font-size: 20px;
        font-weight: 400;
        color: #f5f1e8;
        letter-spacing: 0.02em;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .nav-glyph {
        color: #c2a36b;
        font-size: 22px;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 32px;
        list-style: none;
      }
      .nav-links a {
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(245, 241, 232, 0.65);
        text-decoration: none;
        transition: color 200ms ease;
      }
      .nav-links a:hover {
        color: #f5f1e8;
      }
      .nav-links a.active {
        color: #c2a36b;
      }
      .nav-cta {
        font-family: 'Inter';
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.06em;
        padding: 7px 16px;
        background: #7faf9b;
        color: #0f2a2a;
        border-radius: 4px;
        border: none;
        cursor: pointer;
      }

      .label {
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #c2a36b;
        padding: 12px 32px 4px;
      }
      .divider {
        height: 1px;
        background: rgba(194, 163, 107, 0.12);
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="label">Navbar — Transparent (over hero)</div>
    <nav class="navbar">
      <div class="nav-logo"><span class="nav-glyph">ੴ</span> GarhAnand</div>
      <ul class="nav-links">
        <li><a href="#" class="active">Learn</a></li>
        <li><a href="#">Camps</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Texts</a></li>
      </ul>
      <button class="nav-cta">Seva</button>
    </nav>

    <div class="divider"></div>
    <div class="label">Navbar — Solid (on scroll)</div>
    <nav class="navbar solid">
      <div class="nav-logo"><span class="nav-glyph">ੴ</span> GarhAnand</div>
      <ul class="nav-links">
        <li><a href="#" class="active">Learn</a></li>
        <li><a href="#">Camps</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Texts</a></li>
      </ul>
      <button class="nav-cta">Seva</button>
    </nav>
  </body>
</html>
